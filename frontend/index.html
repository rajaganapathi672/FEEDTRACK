<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>FEEDTRACK | Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Inter:wght@300;400;500;600&amp;family=Manrope:wght@300;400;500;700&amp;family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Outfit:wght@300;400;600&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Space+Grotesk:wght@300;400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ffffff",
                        "background-dark": "#0a0a0a",
                        "charcoal": "#0e0e0e",
                        "olive-accent": "#5e6345",
                        "staff-accent": "#8b5e34",
                        "severity-high": "#e53e3e",
                        "severity-med": "#dd6b20",
                        "severity-low": "#38a169",
                        // Keeping some existing useful ones if needed, or overwriting as per strict request
                        "student-accent": "#a855f7",
                        "status-pending": "#f59e0b",
                        "status-analyzed": "#a855f7",
                        "staff-explorer": "#84cc16",
                        "staff-insights": "#4d7c0f",
                        "status-reviewed": "#10b981",
                    },
                    fontFamily: {
                        display: ["Playfair Display", "serif"],
                        sans: ["DM Sans", "sans-serif"],
                        mono: ["Space Grotesk", "monospace"],
                        outfit: ["Outfit", "sans-serif"],
                        inter: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    animation: {
                        'spin-slow': 'spin 1.5s linear infinite',
                        'pulse-glow': 'pulse-glow 3s ease-in-out infinite',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                            '50%': { opacity: '0.7', transform: 'scale(1.1)' },
                        }
                    }
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        /* Base Styles */
        html, body, #root {
            height: 100%;
            overflow: hidden; /* Prevent scrolling on body, let React app handle it */
        }

        /* Base & Colors */
        .logo-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #C4B5FD 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Dashboard Gradients */
        .student-bg {
            background: radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%), 
                        radial-gradient(circle at 0% 0%, #2e2630 0%, #0a0a0a 100%);
        }
        .staff-bg {
            background: radial-gradient(circle at 80% 20%, rgba(163, 163, 99, 0.15) 0%, transparent 50%), 
                        radial-gradient(circle at 100% 0%, #2c2d20 0%, #0a0a0a 100%);
        }
        .management-gradient-bg {
            background: radial-gradient(circle at 20% 40%, rgba(94, 99, 69, 0.15) 0%, transparent 70%), 
                        linear-gradient(160deg, #1a1b14 0%, #0a0a0a 100%);
        }
        .feedback-gradient-bg {
          background: radial-gradient(circle at 20% 40%, rgba(107, 33, 168, 0.2) 0%, transparent 70%), 
                      linear-gradient(160deg, #150e1a 0%, #0a0a0a 100%);
        }
        
        /* Components */
        .input-line {
            @apply bg-transparent border-0 border-b border-white/20 px-0 py-4 focus:ring-0 focus:border-white transition-colors w-full text-white placeholder:text-white/10 font-sans text-base;
        }
        .metric-card {
            @apply border-l border-white/10 pl-6 py-2 transition-all hover:border-staff-insights animate-fade-in-up;
            animation-fill-mode: both;
        }
        .table-header {
            @apply font-mono text-[10px] uppercase tracking-widest text-white/40 border-b border-white/10 pb-3 text-left;
        }
        .table-row {
            @apply border-b border-white/5 hover:bg-white/[0.02] transition-colors cursor-pointer animate-fade-in-up;
            animation-fill-mode: both;
        }
        .sidebar-module {
            @apply mb-8 pt-6 border-t border-white/5;
        }
        .status-pill {
            @apply px-2 py-0.5 rounded-full text-[9px] uppercase font-mono tracking-tighter transition-all duration-500 ease-out;
        }
        .toggle-checkbox:checked {
            @apply right-0 border-student-accent;
            right: 0;
        }
        .toggle-checkbox:checked + .toggle-label {
            @apply bg-student-accent;
        }
        
        /* Details & Summary */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Typography */
        .giant-text {
            font-size: clamp(4rem, 12vw, 10rem);
            line-height: 0.85;
            letter-spacing: -0.03em;
        }
        
        /* Animations */
        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes springExpand {
            0% { transform: scale(0.95); opacity: 0; }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(139, 92, 246, 0.1); }
            50% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
        }
        @keyframes fillRight {
            from { background-size: 0% 100%; }
            to { background-size: 100% 100%; }
        }
        @keyframes drawCheck {
            0% { stroke-dasharray: 100; stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }

        .animate-slide-in-left {
            animation: slideInLeft 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .animate-slide-in-right {
            animation: slideInRight 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .animate-spring-expand {
            animation: springExpand 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .animate-pulse-glow {
            animation: pulseGlow 3s infinite ease-in-out;
        }
        .animate-draw-check {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.6s ease-out forwards 0.2s;
        }
        
        .stagger-1 { animation-delay: 100ms; }
        .stagger-2 { animation-delay: 200ms; }
        .stagger-3 { animation-delay: 300ms; }
        .stagger-4 { animation-delay: 400ms; }
        .stagger-5 { animation-delay: 500ms; }
        
        .btn-fill-animation {
            background-image: linear-gradient(to right, #a855f7, #a855f7); /* Use student-accent */
            background-repeat: no-repeat;
            background-size: 0% 100%;
            transition: background-size 0.4s ease-out;
        }
        .btn-fill-animation:active, .btn-fill-animation.success {
            background-size: 100% 100%;
        }
        
        /* Grain Overlay */
        .grain-overlay {
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBZ4yr0jt_qVjc6Asbjhim7DluGvTKZcvsI0d7LPtsO0SQNdAjw_911USUrYF3M5MIm419CVSBqel1ioEzy3dBUtsugdVXobCYRafGwJhjpiC3abf78B6sHozPtUQw4gM_vYz6s0PivvNIUifsCwFtJCFRfD5lSfFdl-G1bWMI6g1FHekMdJOj2T8VWXc3bxmh88Q15gsD48w4YD9stgUXaJh_hm3UKl-jw3D1iHa_WX3IHt6vbnrNNkzDrE9QpctPdmJ-G2rEfDg);
            opacity: 0.02;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
